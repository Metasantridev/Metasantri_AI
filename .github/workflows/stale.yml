name: 🧹 Tandai Issue Lama

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: "Issue ini belum ada aktivitas selama 60 hari. Akan ditutup otomatis jika tidak ada respons dalam 7 hari."
          days-before-stale: 60
          days-before-close: 7
          stale-issue-label: "stale"
