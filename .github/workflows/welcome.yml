name: 👋 Sambut Kontributor Baru

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Terima kasih sudah membuka issue di Metasantri AI! Tim akan meninjau secepatnya. 🕌"
          pr-message: "Terima kasih atas kontribusinya untuk Metasantri AI! 🎉"
